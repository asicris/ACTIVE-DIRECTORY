site_name: Active Directory - Documentación
site_description: Documentación completa sobre Active Directory, infraestrutura de rede, integración Linux e Samba4
site_author: ASICRIS
site_url: https://asicris.github.io/ACTIVE-DIRECTORY/
repo_url: https://github.com/asicris/ACTIVE-DIRECTORY
repo_name: ACTIVE-DIRECTORY
edit_uri: edit/main/docs/

# Tema Material para MkDocs
theme:
  name: material
  language: gl
  locale: gl_ES
  favicon: 'https://raw.githubusercontent.com/asicris/ACTIVE-DIRECTORY/main/docs/images/favicon.ico'
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
  font:
    text: 'Roboto'
    code: 'Roboto Mono'
  logo: 'https://raw.githubusercontent.com/asicris/ACTIVE-DIRECTORY/main/docs/images/logo.png'

# Extensións
markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - footnotes
  - toc:
      permalink: true
      toc_depth: 2

# Complementos
plugins:
  - search:
      lang: gl
  - minify:
      minify_html: true

